<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>ViewFit</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="popup" aria-label="ViewFit">
      <header class="popup-header">
        <h1 class="popup-brand" title="ViewFit">
          <svg
            class="popup-brand-mark"
            width="18"
            height="18"
            viewBox="0 0 48 48"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M42 18V40C42 41.1046 41.1046 42 40 42H8C6.89543 42 6 41.1046 6 40V18"
              stroke="currentColor"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M6 8C6 6.89543 6.89543 6 8 6H40C41.1046 6 42 6.89543 42 8V18H6V8Z"
              fill="none"
              stroke="currentColor"
              stroke-width="4"
              stroke-linejoin="round"
            />
            <circle cx="12" cy="12" r="2" fill="currentColor" />
            <circle cx="18" cy="12" r="2" fill="currentColor" />
            <circle cx="24" cy="12" r="2" fill="currentColor" />
          </svg>
          <span class="popup-title">ViewFit</span>
        </h1>
      </header>

      <form id="resizer-form" class="popup-body">
        <section class="panel" aria-label="Presets and size">
          <div id="preset-dropdown" class="preset-list-shell">
            <div id="preset-menu" class="preset-menu" role="listbox" aria-label="Presets"></div>
          </div>

          <select id="preset-select" class="native-select" aria-hidden="true" tabindex="-1"></select>

          <div class="field-grid">
            <div class="field">
              <label class="control-label" for="width-input">Width</label>
              <div class="input-wrap">
                <input
                  id="width-input"
                  class="control-input mono"
                  type="number"
                  min="200"
                  step="1"
                  required
                  aria-label="Width in pixels"
                />
                <span class="input-suffix mono">px</span>
              </div>
            </div>

            <div class="field">
              <label class="control-label" for="height-input">Height</label>
              <div class="input-wrap">
                <input
                  id="height-input"
                  class="control-input mono"
                  type="number"
                  min="200"
                  step="1"
                  required
                  aria-label="Height in pixels"
                />
                <span class="input-suffix mono">px</span>
              </div>
            </div>
          </div>

          <div class="save-block">
            <label class="control-label" for="preset-name-input">Save as preset</label>
            <input
              id="preset-name-input"
              class="control-input control-input--block"
              type="text"
              maxlength="40"
              placeholder="Name (optional)"
              aria-label="Optional name when saving preset"
            />
            <div class="form-actions">
              <button id="add-preset-button" class="ghost-button ghost-button--save" type="button">Save</button>
            </div>
          </div>
        </section>
      </form>

      <footer class="popup-footer">
        <div
          id="status"
          class="status status--hidden"
          role="status"
          aria-live="polite"
          aria-hidden="true"
        ></div>
      </footer>
    </main>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
