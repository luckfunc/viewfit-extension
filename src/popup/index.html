<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>ViewFit</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="popup" aria-label="ViewFit">
      <header class="popup-header">
        <h1 class="popup-title">ViewFit</h1>
      </header>

      <form id="resizer-form" class="popup-body">
        <section class="panel" aria-label="Presets and size">
          <div id="preset-dropdown" class="preset-list-shell">
            <div id="preset-menu" class="preset-menu" role="listbox" aria-label="Presets"></div>
          </div>

          <select id="preset-select" class="native-select" aria-hidden="true" tabindex="-1"></select>

          <div class="field-grid">
            <div class="field">
              <label class="control-label" for="width-input">W</label>
              <div class="input-wrap">
                <input
                  id="width-input"
                  class="control-input mono"
                  type="number"
                  min="200"
                  step="1"
                  required
                  aria-label="Width in pixels"
                />
                <span class="input-suffix mono">px</span>
              </div>
            </div>

            <div class="field">
              <label class="control-label" for="height-input">H</label>
              <div class="input-wrap">
                <input
                  id="height-input"
                  class="control-input mono"
                  type="number"
                  min="200"
                  step="1"
                  required
                  aria-label="Height in pixels"
                />
                <span class="input-suffix mono">px</span>
              </div>
            </div>
          </div>

          <div class="save-row">
            <input
              id="preset-name-input"
              class="control-input"
              type="text"
              maxlength="40"
              aria-label="Optional name when saving preset"
            />
            <button id="add-preset-button" class="ghost-button ghost-button--save" type="button">Save</button>
          </div>
        </section>
      </form>

      <footer class="popup-footer">
        <div
          id="status"
          class="status status--hidden"
          role="status"
          aria-live="polite"
          aria-hidden="true"
        ></div>
      </footer>
    </main>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
